<!-- Modal de Configuração -->
<div class="modal fade" id="modalColunas" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fs-6">Colunas Visíveis</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="text-muted small">Desmarque as colunas que deseja mover para os detalhes.</p>

                <div class="form-check form-switch mb-2">
                    <input class="form-check-input col-toggle" type="checkbox" data-col="municipio"
                        id="toggle-municipio" checked>
                    <label class="form-check-label" for="toggle-municipio">Município</label>
                </div>
                <div class="form-check form-switch mb-2">
                    <input class="form-check-input col-toggle" type="checkbox" data-col="data-voo" id="toggle-data-voo"
                        checked>
                    <label class="form-check-label" for="toggle-data-voo">Data voo</label>
                </div>
                <div class="form-check form-switch mb-2">
                    <input class="form-check-input col-toggle" type="checkbox" data-col="estacao" id="toggle-estacao"
                        checked>
                    <label class="form-check-label" for="toggle-estacao">Estação</label>
                </div>
            </div>
        </div>
    </div>
</div>
